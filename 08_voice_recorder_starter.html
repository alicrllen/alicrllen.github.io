<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Recorder with Timer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    button { margin-right: 8px; margin-bottom: 12px; padding: 10px 16px; cursor: pointer; }
    #status, #result { margin-top: 12px; white-space: pre-wrap; }
    
    /* 錄音時間顯示樣式 */
    #timer { font-size: 24px; font-weight: bold; color: #d9534f; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Voice Recorder → n8n Webhook</h1>

  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>
  <button id="uploadBtn" disabled>Upload to n8n</button>

  <div id="timer">00:00</div>

  <audio id="player" controls></audio>
  <div id="status"></div>
  <div id="result"></div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const timerEl = document.getElementById("timer"); // 取得計時器 DOM
    
    let mediaRecorder = null;
    let audioChunks = [];
    let startTime = null;
    let timerInterval = null;

    // 格式化時間函數
    function updateTimer() {
      const now = Date.now();
      const diff = new Date(now - startTime);
      const minutes = String(diff.getUTCMinutes()).padStart(2, '0');
      const seconds = String(diff.getUTCSeconds()).padStart(2, '0');
      timerEl.textContent = `${minutes}:${seconds}`;
    }

    startBtn.addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
          document.getElementById("player").src = URL.createObjectURL(audioBlob);
          uploadBtn.disabled = false;
        };

        // 開始錄音並啟動計時器
        mediaRecorder.start();
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000); // 每秒更新
        
        startBtn.disabled = true;
        stopBtn.disabled = false;
        timerEl.textContent = "00:00";
      } catch (err) { alert("Microphone access denied"); }
    });

    stopBtn.addEventListener("click", () => {
      mediaRecorder.stop();
      clearInterval(timerInterval); // 停止計時器
      startBtn.disabled = false;
      stopBtn.disabled = true;
    });

    // ... uploadBtn 邏輯保持不變 ...
  </script>
</body>
</html>
