<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Recorder with Visualizer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    button { margin-right: 8px; margin-bottom: 12px; padding: 10px 16px; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.6; }
    
    #status, #result { margin-top: 12px; white-space: pre-wrap; word-break: break-all; }
    audio { display: block; margin-top: 12px; width: 100%; }

    /* 視覺化 Bar 的樣式 */
    #visualizer-container { 
      width: 100%; height: 20px; background: #eee; 
      margin: 15px 0; border-radius: 5px; overflow: hidden; 
    }
    #visualizer-bar { 
      width: 0%; height: 100%; background: #4CAF50; 
      transition: width 0.1s ease-out; 
    }
  </style>
</head>
<body>
  <h1>Voice Recorder → n8n Webhook</h1>

  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>
  <button id="uploadBtn" disabled>Upload to n8n</button>

  <div id="visualizer-container">
    <div id="visualizer-bar"></div>
  </div>

  <audio id="player" controls></audio>

  <div id="status"></div>
  <div id="result"></div>

  <script>
    const webhookUrl = "https://alicrllen.app.n8n.cloud/webhook-test/voice";

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const player = document.getElementById("player");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const visualizerBar = document.getElementById("visualizer-bar");

    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let stream = null;
    
    // 視覺化相關變數
    let audioContext = null;
    let animationId = null;

    function setStatus(text) { statusEl.textContent = text; }

    // 視覺化更新迴圈
    function updateVisualizer(analyser) {
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(dataArray);
      
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
      const average = sum / dataArray.length;
      
      visualizerBar.style.width = Math.min(average * 2, 100) + "%";
      animationId = requestAnimationFrame(() => updateVisualizer(analyser));
    }

    startBtn.addEventListener("click", async () => {
      try {
        resultEl.textContent = "";
        audioChunks = [];
        audioBlob = null;

        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // 初始化錄音器
        let mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
        mediaRecorder = new MediaRecorder(stream, { mimeType });

        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        
        mediaRecorder.onstop = () => {
          const extension = mimeType.includes("mp4") ? "m4a" : "webm";
          audioBlob = new Blob(audioChunks, { type: mimeType });
          player.src = URL.createObjectURL(audioBlob);
          uploadBtn.disabled = false;
          setStatus(`Recording stopped. File ready: recording.${extension}`);
        };

        // 初始化視覺化
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        updateVisualizer(analyser);

        mediaRecorder.start();
        setStatus("Recording...");
        startBtn.disabled = true;
        stopBtn.disabled = false;
        uploadBtn.disabled = true;
      } catch (err) {
        setStatus("Error: " + err.message);
      }
    });

    stopBtn.addEventListener("click", () => {
      if (mediaRecorder) mediaRecorder.stop();
      if (stream) stream.getTracks().forEach(t => t.stop());
      
      // 清理視覺化資源
      if (animationId) cancelAnimationFrame(animationId);
      if (audioContext) audioContext.close();
      visualizerBar.style.width = "0%";
      
      startBtn.disabled = false;
      stopBtn.disabled = true;
    });

    uploadBtn.addEventListener("click", async () => {
      if (!audioBlob) return;
      try {
        setStatus("Uploading...");
        const formData = new FormData();
        formData.append("audio", audioBlob, "recording.webm");
        
        const response = await fetch(webhookUrl, { method: "POST", body: formData });
        const data = await response.json().catch(() => response.text());
        resultEl.textContent = JSON.stringify(data, null, 2);
        setStatus(`Upload complete. Status: ${response.status}`);
      } catch (err) {
        setStatus("Upload failed: " + err.message);
      }
    });
  </script>
</body>
</html>
